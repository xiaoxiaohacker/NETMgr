version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: netmgr-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: netmgr
      MYSQL_USER: netmgr
      MYSQL_PASSWORD: netmgrpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:alpine
    container_name: netmgr-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: netmgr-backend
    restart: always
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=mysql+pymysql://netmgr:netmgrpassword@db:3306/netmgr
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-super-secret-key-here-make-it-long-and-random
    ports:
      - "8000:8000"
    volumes:
      - ./config_backups:/app/config_backups
      - ./system_settings.json:/app/system_settings.json

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
    container_name: netmgr-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      - VUE_APP_API_BASE_URL=http://localhost/api

volumes:
  mysql_data: